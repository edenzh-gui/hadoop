---
# Global Installation Directories
install_base_dir: "/opt/module"

# Component Versions
zookeeper_version: "3.7.2"
hadoop_version: "3.3.6"
spark_version: "3.5.8"

# Download URLs
zookeeper_download_url: "https://archive.apache.org/dist/zookeeper/zookeeper-{{ zookeeper_version }}/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"
hadoop_download_url: "https://downloads01-he-fi.apache.org/hadoop/common/hadoop-{{ hadoop_version }}/hadoop-{{ hadoop_version }}.tar.gz"
spark_download_url: "https://downloads01-he-fi.apache.org/spark/spark-{{ spark_version }}/spark-{{ spark_version }}-bin-hadoop3.tgz"

# Extracted Paths
zookeeper_home: "{{ install_base_dir }}/apache-zookeeper-{{ zookeeper_version }}-bin"
hadoop_home: "{{ install_base_dir }}/hadoop-{{ hadoop_version }}"
spark_home: "{{ install_base_dir }}/spark-{{ spark_version }}-bin-hadoop3"

# JDK Path (Ubuntu apt default)
java_home: "/usr/lib/jvm/java-8-openjdk-amd64"
