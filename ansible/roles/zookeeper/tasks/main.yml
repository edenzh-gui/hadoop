---
- name: Download ZooKeeper package
  get_url:
    url: "{{ zookeeper_download_url }}"
    dest: "/tmp/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"

- name: Extract ZooKeeper
  unarchive:
    src: "/tmp/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"
    dest: "{{ install_base_dir }}"
    remote_src: yes
    creates: "{{ zookeeper_home }}/bin/zkServer.sh"

- name: Create ZK data directory
  file:
    path: "{{ zookeeper_home }}/zkData"
    state: directory
    mode: '0755'

- name: Generate myid file
  copy:
    content: "{{ myid }}\n"
    dest: "{{ zookeeper_home }}/zkData/myid"

- name: Configure zoo.cfg
  template:
    src: zoo.cfg.j2
    dest: "{{ zookeeper_home }}/conf/zoo.cfg"
